name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest with coverage and HTML report
        run: |
          pytest \
            --cov \
            --cov-report=xml \
            --cov-report=term-missing \
            --html=report.html \
            --self-contained-html \
            --junitxml=junit.xml

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report-${{ matrix.python-version }}
          path: |
            report.html
            coverage.xml
            junit.xml

      - name: Upload coverage to summary
        if: always()
        run: |
          echo "### Coverage (Python ${{ matrix.python-version }})" >> $GITHUB_STEP_SUMMARY
          python -c "import xml.etree.ElementTree as ET; \
            r = ET.parse('coverage.xml').getroot(); \
            print(f\"Line: {float(r.get('line-rate'))*100:.1f}%  |  Branch: {float(r.get('branch-rate'))*100:.1f}%\")" \
            >> $GITHUB_STEP_SUMMARY
